name: 'Lens Event Logger'
description: 'Send deployment and CI events to your Lens dashboard'
author: 'Lens Team'
inputs:
  api_host:
    description: 'The URL of your Lens API (e.g., https://lens.myorg.com)'
    required: true
  api_key:
    description: 'The secure API key to authenticate with Lens'
    required: true
  workflow_name:
    description: 'The name of the workflow (e.g., Deploy to Production)'
    required: true
  artifact:
    description: |
      A YAML-style dictionary defining the artifact being deployed.
      Example:
        name: lens-frontend
        version: v1.0.0
    required: false
  tags:
    description: |
      A YAML-style list of key-value pairs representing tags for the event.
      Example:
        env: production
        team: backend
    required: false
  custom_data:
    description: |
      A YAML-style list of key-value pairs representing custom data for the event.
    required: false
  metrics:
    description: |
      A YAML-style list of key-value numeric pairs representing metrics for the event.
      Example:
        build_time_seconds: 42.5
    required: false
  chart_configs:
    description: |
      A YAML-style map defining the preferred visualization type (e.g., 'bar' or 'line') for specific metrics.
      Example:
        build_time_seconds:
          type: line
        error_count:
          type: bar
    required: false
  track_dora:
    description: 'Set to true to automatically compute and attach DORA metrics (lead time, deployment count, change failure rate)'
    required: false
    default: 'false'
  github_token:
    description: 'The GITHUB_TOKEN used to fetch commit data for DORA metrics'
    required: false
  job_status:
    description: 'The status of the deployment job (e.g., ${{ job.status }})'
    required: false
runs:
  using: 'node24'
  main: 'dist/index.js'

branding:
  icon: 'eye'
  color: 'blue'
