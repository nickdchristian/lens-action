name: Continuous Integration

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Run Tests
        run: npm run test

      - name: Verify Build
        run: |
          npm run build
          if [ -n "$(git status --porcelain dist/)" ]; then
            echo "Error: The dist/ directory is out of sync."
            echo "Please run 'npm run build' locally and commit the updated dist/ folder."
            git diff
            exit 1
          fi
